name: GitHub CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# No permissions are required for this workflow
permissions: {}

jobs:
  test:
    name: General checks, tests and coverage reporting
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v7.0.0

    - name: Use Node.js LTS 22
      uses: actions/setup-node@v6.4.0
      with:
        node-version: 22

    - name: Install dependencies
      run: npm ci --engine-strict # --engine-strict is used to fail-fast if deps require node versions unsupported by the repo

    - name: Perform checks and tests
      run: npm test

    - name: Send report to Coveralls
      uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
      continue-on-error: true # Do not fail the job if coverage reporting fails (e.g. service is down)

  test-matrix:
    name: Unit tests on Node.js ${{ matrix.node-version }} and ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
        os: [ubuntu-latest, windows-latest, macOS-latest]
    runs-on: ${{ matrix.os }}
    steps:

    - uses: actions/checkout@v7.0.0

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6.4.0
      with:
        node-version: ${{ matrix.node-version }}

    - run: npm ci
      name: Install dependencies

    - run: npm ls --prod
      name: Check for missing / extraneous Dependencies

    - run: npm run unit
      name: Run unit tests
